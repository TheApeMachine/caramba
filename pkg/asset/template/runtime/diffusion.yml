kind: program
name: diffusion
category: runtime

include:
  text_encoder: model/diffusion/flux-2-klein-4b-text-encoder.yml
  transformer: hf://black-forest-labs/FLUX.2-klein-4B#transformer
  vae: hf://black-forest-labs/FLUX.2-klein-4B#vae

state:
  - name: latents
    type: tensor
    shape: [1, 4096, 128]
    init: gaussian
    seed: 0
  - name: step_index
    type: counter

schedulers:
  scheduler:
    type: flow_match_euler_discrete
    config:
      steps: 4
      num_train_timesteps: 1000

main:
  - in: prompt
    op: tokenizer.encode
    config:
      tokenizer: hf://black-forest-labs/FLUX.2-klein-4B
      tokenizer_file: tokenizer/tokenizer.json
    out: input_ids

  - in:
      input_ids: input_ids
    op: graph.call
    graph: text_encoder
    out:
      prompt_embeds: prompt_embeds

  - op: scheduler.timesteps
    config:
      scheduler: scheduler
    out: timesteps

  - op: control.loop_each
    source: timesteps
    as: timestep
    steps:
      - in:
          hidden_states: state.latents
          encoder_hidden_states: prompt_embeds
          timestep: timestep
        op: graph.call
        graph: transformer
        out:
          sample: velocity

      - in:
          latents: state.latents
          velocity: velocity
        op: scheduler.step
        config:
          scheduler: scheduler
        out:
          latents: state.latents

      - op: state.update
        config:
          update: increment
          target: state.step_index

  - in:
      latents: state.latents
    op: graph.call
    graph: vae
    out:
      image: image

  - in:
      image: image
    op: io.write_image
    config:
      path: out.png
      width: 1024
      height: 1024
      channels: 3
      layout: channel_planar
      range: neg_one_one
