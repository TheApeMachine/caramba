kind: program
name: chat
category: runtime

include:
  model: model/llm/llama-3-2-1b-instruct
  tokenizer: operation/tokenizer/load   # or hub ref on model manifest

main:
  # Session: keep reading until stdin closes or user exits
  - repeat: until_eof
    steps:
      - in: <stdin>
        op: io.read_line
        out: user_text

      - in: user_text
        op: tokenizer.encode
        out: input_ids

      # Decode loop — all atomics / graph.call, no sampler object
      - repeat: ${include.model.generation.max_new_tokens}
        steps:
          - in: [input_ids, kv, position]
            op: graph.call
            graph: model
            out: [logits, kv, position]

          - in: logits
            op: sampling.topk_sample
            config:
              temperature: ${include.model.generation.temperature}
              top_k: ${include.model.generation.top_k}
              top_p: ${include.model.generation.top_p}
            out: next_token

          - in: next_token
            op: io.emit_token
            out: _

          - in: next_token
            op: value.assign
            out: input_ids