# FLUX-2 transformer denoiser topology, parameterised on the model's
# config so any FLUX-2-shaped checkpoint can drop into this file by
# including it with the right dimensions. The node IDs match the
# safetensors tensor prefixes one-to-one — that's what lets the weight
# binder map values to nodes without any architecture-specific Go.
#
# This file is data, not code. Adding a new architecture means writing
# another sibling YAML, not modifying any Go source. The include caller
# supplies these variables:
#
#   in_channels             latent channels (e.g. 128)
#   hidden_size             model dim (e.g. 3072)
#   double_hidden_size      2*hidden_size
#   triple_hidden_size      3*hidden_size
#   joint_attention_dim     text encoder hidden dim (e.g. 7680)
#   num_layers              dual-stream block count (e.g. 5)
#   num_single_layers       single-stream block count (e.g. 20)
#   num_attention_heads     attention head count (e.g. 24)
#   attention_head_dim      per-head dim (e.g. 128)
#   mlp_inner               SwiGLU inner dim (3*hidden_size for mlp_ratio=3)
#   mlp_packed              SwiGLU packed gate+up dim (2*mlp_inner)
#   rope_theta              RoPE base (e.g. 2000)
#   eps                     RMSNorm eps (e.g. 1e-06)
#   latent_seq_len          latent token count after concat trim (e.g. 4096)
#   dual_terminal_index     `${num_layers}` as a literal — used to wire the
#                           handoff between dual and single stream sections
#   joint_terminal_index    `${num_layers} + ${num_single_layers}` as a literal
inputs: [hidden_states, encoder_hidden_states, timestep]
nodes:
  - id: time_guidance_embed.time_proj
    op: embedding.timestep
    in: [timestep]
    out: [timestep_projection]
    config:
      dim: 256
      flip_sin_to_cos: true
      downscale_freq_shift: 0
      max_period: 10000

  - id: time_guidance_embed.timestep_embedder.linear_1
    op: projection.linear
    in: [timestep_projection]
    out: [timestep_hidden]
    config:
      in_features: 256
      out_features: ${include.hidden_size}

  - id: time_guidance_embed.timestep_embedder.act
    op: activation.swish
    in: [timestep_hidden]
    out: [timestep_activated]

  - id: time_guidance_embed.timestep_embedder.linear_2
    op: projection.linear
    in: [timestep_activated]
    out: [temb]
    config:
      in_features: ${include.hidden_size}
      out_features: ${include.hidden_size}

  - id: x_embedder
    op: projection.linear
    in: [hidden_states]
    out: [latent_embedding]
    config:
      in_features: ${include.in_channels}
      out_features: ${include.hidden_size}

  - id: context_embedder
    op: projection.linear
    in: [encoder_hidden_states]
    out: [context_embedding]
    config:
      in_features: ${include.joint_attention_dim}
      out_features: ${include.hidden_size}

  # FLUX-2 joint attention: concatenate latent and text tokens
  # along the sequence axis so every block attends to both. The
  # resulting h_0 has shape [1, latent_tokens + text_tokens, hidden_size].
  - id: conditioning_concat
    op: shape.concat
    in: [latent_embedding, context_embedding]
    out: [h_0]
    config:
      dim: 1

  - repeat: ${include.num_layers}
    index: i
    template:
      - id: "transformer_blocks.${i}.norm1"
        op: math.rmsnorm
        in: ["h_${i}"]
        out: ["tb_norm1_${i}"]
        config: { eps: "${include.eps}", affine: false }

      - id: "transformer_blocks.${i}.attn.to_q"
        op: projection.linear
        in: ["tb_norm1_${i}"]
        out: ["tb_q_${i}"]
        config: { in_features: "${include.hidden_size}", out_features: "${include.hidden_size}" }

      - id: "transformer_blocks.${i}.attn.to_k"
        op: projection.linear
        in: ["tb_norm1_${i}"]
        out: ["tb_k_${i}"]
        config: { in_features: "${include.hidden_size}", out_features: "${include.hidden_size}" }

      - id: "transformer_blocks.${i}.attn.to_v"
        op: projection.linear
        in: ["tb_norm1_${i}"]
        out: ["tb_v_${i}"]
        config: { in_features: "${include.hidden_size}", out_features: "${include.hidden_size}" }

      - id: "tb_q_heads_${i}"
        op: shape.view_as_heads
        in: ["tb_q_${i}"]
        out: ["tb_qh_${i}"]
        config: { num_heads: "${include.num_attention_heads}" }

      - id: "tb_k_heads_${i}"
        op: shape.view_as_heads
        in: ["tb_k_${i}"]
        out: ["tb_kh_${i}"]
        config: { num_heads: "${include.num_attention_heads}" }

      - id: "tb_v_heads_${i}"
        op: shape.view_as_heads
        in: ["tb_v_${i}"]
        out: ["tb_vh_${i}"]
        config: { num_heads: "${include.num_attention_heads}" }

      - id: "tb_rope_q_${i}"
        op: positional.rope
        in: ["tb_qh_${i}"]
        out: ["tb_qr_${i}"]
        config:
          base: ${include.rope_theta}
          head_dim: ${include.attention_head_dim}
          mode: half

      - id: "tb_rope_k_${i}"
        op: positional.rope
        in: ["tb_kh_${i}"]
        out: ["tb_kr_${i}"]
        config:
          base: ${include.rope_theta}
          head_dim: ${include.attention_head_dim}
          mode: half

      - id: "transformer_blocks.${i}.attn"
        op: attention.sdpa
        in: ["tb_qr_${i}", "tb_kr_${i}", "tb_vh_${i}"]
        out: ["tb_attn_${i}"]
        config: { num_heads: "${include.num_attention_heads}", head_dim: "${include.attention_head_dim}", causal: false }

      - id: "tb_merge_heads_${i}"
        op: shape.merge_heads
        in: ["tb_attn_${i}"]
        out: ["tb_attn_flat_${i}"]

      - id: "transformer_blocks.${i}.attn.to_out.0"
        op: projection.linear
        in: ["tb_attn_flat_${i}"]
        out: ["tb_attn_out_${i}"]
        config: { in_features: "${include.hidden_size}", out_features: "${include.hidden_size}" }

      - id: "tb_attn_residual_${i}"
        op: math.add
        in: ["h_${i}", "tb_attn_out_${i}"]
        out: ["tb_mid_${i}"]

      - id: "transformer_blocks.${i}.norm2"
        op: math.rmsnorm
        in: ["tb_mid_${i}"]
        out: ["tb_norm2_${i}"]
        config: { eps: "${include.eps}", affine: false }

      - id: "transformer_blocks.${i}.ff.linear_in"
        op: projection.linear
        in: ["tb_norm2_${i}"]
        out: ["tb_gate_up_${i}"]
        config: { in_features: "${include.hidden_size}", out_features: "${include.mlp_packed}" }

      - id: "tb_swiglu_${i}"
        op: activation.swiglu
        in: ["tb_gate_up_${i}"]
        out: ["tb_mlp_${i}"]

      - id: "transformer_blocks.${i}.ff.linear_out"
        op: projection.linear
        in: ["tb_mlp_${i}"]
        out: ["tb_mlp_out_${i}"]
        config: { in_features: "${include.mlp_inner}", out_features: "${include.hidden_size}" }

      - id: "tb_mlp_residual_${i}"
        op: math.add
        in: ["tb_mid_${i}", "tb_mlp_out_${i}"]
        out: ["h_${next_i}"]

  - repeat: ${include.num_single_layers}
    index: i
    offset: ${include.num_layers}
    template:
      - id: "single_transformer_blocks.${i}.norm"
        op: math.rmsnorm
        in: ["h_${offset_i}"]
        out: ["st_norm_${i}"]
        config: { eps: "${include.eps}", affine: false }

      - id: "single_transformer_blocks.${i}.attn.to_q"
        op: projection.linear
        in: ["st_norm_${i}"]
        out: ["st_q_${i}"]
        config:
          in_features: "${include.hidden_size}"
          out_features: "${include.hidden_size}"
          from_safetensors:
            weight: "single_transformer_blocks.${i}.attn.to_qkv_mlp_proj.weight"
            slice_axis: output
            slice_start: 0

      - id: "single_transformer_blocks.${i}.attn.to_k"
        op: projection.linear
        in: ["st_norm_${i}"]
        out: ["st_k_${i}"]
        config:
          in_features: "${include.hidden_size}"
          out_features: "${include.hidden_size}"
          from_safetensors:
            weight: "single_transformer_blocks.${i}.attn.to_qkv_mlp_proj.weight"
            slice_axis: output
            slice_start: "${include.hidden_size}"

      - id: "single_transformer_blocks.${i}.attn.to_v"
        op: projection.linear
        in: ["st_norm_${i}"]
        out: ["st_v_${i}"]
        config:
          in_features: "${include.hidden_size}"
          out_features: "${include.hidden_size}"
          from_safetensors:
            weight: "single_transformer_blocks.${i}.attn.to_qkv_mlp_proj.weight"
            slice_axis: output
            slice_start: "${include.double_hidden_size}"

      - id: "st_q_heads_${i}"
        op: shape.view_as_heads
        in: ["st_q_${i}"]
        out: ["st_qh_${i}"]
        config: { num_heads: "${include.num_attention_heads}" }

      - id: "st_k_heads_${i}"
        op: shape.view_as_heads
        in: ["st_k_${i}"]
        out: ["st_kh_${i}"]
        config: { num_heads: "${include.num_attention_heads}" }

      - id: "st_v_heads_${i}"
        op: shape.view_as_heads
        in: ["st_v_${i}"]
        out: ["st_vh_${i}"]
        config: { num_heads: "${include.num_attention_heads}" }

      - id: "st_rope_q_${i}"
        op: positional.rope
        in: ["st_qh_${i}"]
        out: ["st_qr_${i}"]
        config:
          base: ${include.rope_theta}
          head_dim: ${include.attention_head_dim}
          mode: half

      - id: "st_rope_k_${i}"
        op: positional.rope
        in: ["st_kh_${i}"]
        out: ["st_kr_${i}"]
        config:
          base: ${include.rope_theta}
          head_dim: ${include.attention_head_dim}
          mode: half

      - id: "single_transformer_blocks.${i}.attn"
        op: attention.sdpa
        in: ["st_qr_${i}", "st_kr_${i}", "st_vh_${i}"]
        out: ["st_attn_${i}"]
        config: { num_heads: "${include.num_attention_heads}", head_dim: "${include.attention_head_dim}", causal: false }

      - id: "st_merge_heads_${i}"
        op: shape.merge_heads
        in: ["st_attn_${i}"]
        out: ["st_attn_flat_${i}"]

      - id: "single_transformer_blocks.${i}.attn.to_out.0"
        op: projection.linear
        in: ["st_attn_flat_${i}"]
        out: ["st_attn_out_${i}"]
        config:
          in_features: "${include.hidden_size}"
          out_features: "${include.hidden_size}"
          from_safetensors:
            weight: "single_transformer_blocks.${i}.attn.to_out.weight"
            slice_axis: input
            slice_start: 0

      - id: "st_attn_residual_${i}"
        op: math.add
        in: ["h_${offset_i}", "st_attn_out_${i}"]
        out: ["st_mid_${i}"]

      - id: "single_transformer_blocks.${i}.proj_mlp"
        op: projection.linear
        in: ["st_norm_${i}"]
        out: ["st_gate_up_${i}"]
        config:
          in_features: "${include.hidden_size}"
          out_features: "${include.mlp_packed}"
          from_safetensors:
            weight: "single_transformer_blocks.${i}.attn.to_qkv_mlp_proj.weight"
            slice_axis: output
            slice_start: "${include.triple_hidden_size}"

      - id: "st_swiglu_${i}"
        op: activation.swiglu
        in: ["st_gate_up_${i}"]
        out: ["st_mlp_${i}"]

      - id: "single_transformer_blocks.${i}.proj_out"
        op: projection.linear
        in: ["st_mlp_${i}"]
        out: ["st_mlp_out_${i}"]
        config:
          in_features: "${include.mlp_inner}"
          out_features: "${include.hidden_size}"
          from_safetensors:
            weight: "single_transformer_blocks.${i}.attn.to_out.weight"
            slice_axis: input
            slice_start: "${include.hidden_size}"

      - id: "st_mlp_residual_${i}"
        op: math.add
        in: ["st_mid_${i}", "st_mlp_out_${i}"]
        out: ["h_${next_offset_i}"]

  - id: norm_out
    op: activation.swish
    in: [temb]
    out: [norm_out_conditioning]

  - id: norm_out.linear
    op: projection.linear
    in: [norm_out_conditioning]
    out: [norm_out_modulation]
    config:
      in_features: ${include.hidden_size}
      out_features: ${include.double_hidden_size}

  - id: norm_out.adaptive
    op: math.adaptive_rmsnorm
    in: ["h_${include.joint_terminal_index}", norm_out_modulation]
    out: [final_norm]
    config: { eps: "${include.eps}", affine: false }

  - id: proj_out
    op: projection.linear
    in: [final_norm]
    out: [sample_joint]
    config:
      in_features: ${include.hidden_size}
      out_features: ${include.in_channels}

  # Joint dual+single attention has been operating on the full
  # latent + text sequence; the diffusion scheduler only consumes
  # the latent portion. Slice off the leading latent_seq_len tokens
  # here so the runtime ledger of "velocity" matches the latent shape.
  - id: denoiser_output
    op: shape.slice
    in: [sample_joint]
    out: [sample]
    config:
      dim: 1
      start: 0
      end: ${include.latent_seq_len}
