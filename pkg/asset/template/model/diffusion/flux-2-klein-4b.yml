kind: Block
category: model
op: block.model.diffusion_flux_2_klein_4b
name: FLUX.2 Klein 4B
label: FLUX.2 Klein 4B
description: Black Forest Labs FLUX.2 Klein 4B rectified-flow transformer denoiser.
initial_width: 320
inputs:
  - name: hidden_states
    type: tensor
    description: Latent tokens [batch, seq_len, 128].
  - name: encoder_hidden_states
    type: tensor
    description: Text encoder states [batch, context_len, 7680].
  - name: timestep
    type: tensor
    description: Diffusion timestep conditioning.
outputs:
  - name: sample
    type: tensor
    description: Predicted latent residual [batch, seq_len, 128].

system:
  runtime:
    type: diffusion
    backend: metal
    model:
      source: black-forest-labs/FLUX.2-klein-4B
      repo_type: model
      revision: main
    tokenizer:
      source: black-forest-labs/FLUX.2-klein-4B
      file: tokenizer/tokenizer.json
      repo_type: model
      revision: main
    text_encoder:
      source: black-forest-labs/FLUX.2-klein-4B
      path: text_encoder
      manifest: model/diffusion/flux-2-klein-4b-text-encoder.yml
      file: text_encoder/model.safetensors.index.json
      architecture: Qwen3ForCausalLM
      hidden_size: 2560
      intermediate_size: 9728
      num_hidden_layers: 36
      num_attention_heads: 32
      num_key_value_heads: 8
      head_dim: 128
      vocab_size: 151936
      rope_theta: 1000000
    transformer:
      source: black-forest-labs/FLUX.2-klein-4B
      file: transformer/diffusion_pytorch_model.safetensors
      architecture: Flux2Transformer2DModel
      in_channels: 128
      hidden_size: 3072
      joint_attention_dim: 7680
      mlp_ratio: 3.0
      num_layers: 5
      num_single_layers: 20
      num_attention_heads: 24
      attention_head_dim: 128
      axes_dims_rope: [32, 32, 32, 32]
      rope_theta: 2000
      eps: 1e-06
      patch_size: 1
      timestep_guidance_channels: 256
      guidance_embeds: false
    scheduler:
      type: flow_match_euler_discrete
      distilled: true
      num_inference_steps: 4
      guidance_scale: 1.0
    vae:
      source: black-forest-labs/FLUX.2-klein-4B
      path: vae
      manifest: model/diffusion/flux-2-klein-4b-vae-decoder.yml
      file: vae/diffusion_pytorch_model.safetensors
      architecture: AutoencoderKLFlux2
    generation:
      height: 1024
      width: 1024
      latent_channels: 128
      latent_downsample: 16
      patch_size: 1
      max_sequence_length: 1024
      seed: 1337
      output: flux-2-klein-4b.png

  topology:
    inputs: [hidden_states, encoder_hidden_states, timestep]
    nodes:
      - id: x_embedder
        op: projection.linear
        in: [hidden_states]
        out: [latent_embedding]
        config:
          in_features: 128
          out_features: 3072

      - id: context_embedder
        op: projection.linear
        in: [encoder_hidden_states]
        out: [context_embedding]
        config:
          in_features: 7680
          out_features: 3072

      - id: conditioning_add
        op: math.add
        in: [latent_embedding, context_embedding]
        out: [h_0]

      - repeat: 5
        index: i
        template:
          - id: "transformer_blocks.${i}.norm1"
            op: math.rmsnorm
            in: ["h_${i}"]
            out: ["tb_norm1_${i}"]
            config: { eps: 1e-06, affine: false }

          - id: "transformer_blocks.${i}.attn.to_q"
            op: projection.linear
            in: ["tb_norm1_${i}"]
            out: ["tb_q_${i}"]
            config: { in_features: 3072, out_features: 3072 }

          - id: "transformer_blocks.${i}.attn.to_k"
            op: projection.linear
            in: ["tb_norm1_${i}"]
            out: ["tb_k_${i}"]
            config: { in_features: 3072, out_features: 3072 }

          - id: "transformer_blocks.${i}.attn.to_v"
            op: projection.linear
            in: ["tb_norm1_${i}"]
            out: ["tb_v_${i}"]
            config: { in_features: 3072, out_features: 3072 }

          - id: "tb_q_heads_${i}"
            op: shape.view_as_heads
            in: ["tb_q_${i}"]
            out: ["tb_qh_${i}"]
            config: { num_heads: 24 }

          - id: "tb_k_heads_${i}"
            op: shape.view_as_heads
            in: ["tb_k_${i}"]
            out: ["tb_kh_${i}"]
            config: { num_heads: 24 }

          - id: "tb_v_heads_${i}"
            op: shape.view_as_heads
            in: ["tb_v_${i}"]
            out: ["tb_vh_${i}"]
            config: { num_heads: 24 }

          - id: "tb_rope_q_${i}"
            op: positional.rope
            in: ["tb_qh_${i}"]
            out: ["tb_qr_${i}"]
            config:
              base: 2000
              head_dim: 128
              mode: half

          - id: "tb_rope_k_${i}"
            op: positional.rope
            in: ["tb_kh_${i}"]
            out: ["tb_kr_${i}"]
            config:
              base: 2000
              head_dim: 128
              mode: half

          - id: "transformer_blocks.${i}.attn"
            op: attention.sdpa
            in: ["tb_qr_${i}", "tb_kr_${i}", "tb_vh_${i}"]
            out: ["tb_attn_${i}"]
            config: { num_heads: 24, head_dim: 128, causal: false }

          - id: "tb_merge_heads_${i}"
            op: shape.merge_heads
            in: ["tb_attn_${i}"]
            out: ["tb_attn_flat_${i}"]

          - id: "transformer_blocks.${i}.attn.to_out.0"
            op: projection.linear
            in: ["tb_attn_flat_${i}"]
            out: ["tb_attn_out_${i}"]
            config: { in_features: 3072, out_features: 3072 }

          - id: "tb_attn_residual_${i}"
            op: math.add
            in: ["h_${i}", "tb_attn_out_${i}"]
            out: ["tb_mid_${i}"]

          - id: "transformer_blocks.${i}.norm2"
            op: math.rmsnorm
            in: ["tb_mid_${i}"]
            out: ["tb_norm2_${i}"]
            config: { eps: 1e-06, affine: false }

          - id: "transformer_blocks.${i}.ff.net.0.proj"
            op: projection.linear
            in: ["tb_norm2_${i}"]
            out: ["tb_gate_up_${i}"]
            config: { in_features: 3072, out_features: 18432 }

          - id: "tb_swiglu_${i}"
            op: activation.swiglu
            in: ["tb_gate_up_${i}"]
            out: ["tb_mlp_${i}"]

          - id: "transformer_blocks.${i}.ff.net.2"
            op: projection.linear
            in: ["tb_mlp_${i}"]
            out: ["tb_mlp_out_${i}"]
            config: { in_features: 9216, out_features: 3072 }

          - id: "tb_mlp_residual_${i}"
            op: math.add
            in: ["tb_mid_${i}", "tb_mlp_out_${i}"]
            out: ["h_${next_i}"]

      - repeat: 20
        index: i
        offset: 5
        template:
          - id: "single_transformer_blocks.${i}.norm"
            op: math.rmsnorm
            in: ["h_${offset_i}"]
            out: ["st_norm_${i}"]
            config: { eps: 1e-06, affine: false }

          - id: "single_transformer_blocks.${i}.attn.to_q"
            op: projection.linear
            in: ["st_norm_${i}"]
            out: ["st_q_${i}"]
            config: { in_features: 3072, out_features: 3072 }

          - id: "single_transformer_blocks.${i}.attn.to_k"
            op: projection.linear
            in: ["st_norm_${i}"]
            out: ["st_k_${i}"]
            config: { in_features: 3072, out_features: 3072 }

          - id: "single_transformer_blocks.${i}.attn.to_v"
            op: projection.linear
            in: ["st_norm_${i}"]
            out: ["st_v_${i}"]
            config: { in_features: 3072, out_features: 3072 }

          - id: "st_q_heads_${i}"
            op: shape.view_as_heads
            in: ["st_q_${i}"]
            out: ["st_qh_${i}"]
            config: { num_heads: 24 }

          - id: "st_k_heads_${i}"
            op: shape.view_as_heads
            in: ["st_k_${i}"]
            out: ["st_kh_${i}"]
            config: { num_heads: 24 }

          - id: "st_v_heads_${i}"
            op: shape.view_as_heads
            in: ["st_v_${i}"]
            out: ["st_vh_${i}"]
            config: { num_heads: 24 }

          - id: "st_rope_q_${i}"
            op: positional.rope
            in: ["st_qh_${i}"]
            out: ["st_qr_${i}"]
            config:
              base: 2000
              head_dim: 128
              mode: half

          - id: "st_rope_k_${i}"
            op: positional.rope
            in: ["st_kh_${i}"]
            out: ["st_kr_${i}"]
            config:
              base: 2000
              head_dim: 128
              mode: half

          - id: "single_transformer_blocks.${i}.attn"
            op: attention.sdpa
            in: ["st_qr_${i}", "st_kr_${i}", "st_vh_${i}"]
            out: ["st_attn_${i}"]
            config: { num_heads: 24, head_dim: 128, causal: false }

          - id: "st_merge_heads_${i}"
            op: shape.merge_heads
            in: ["st_attn_${i}"]
            out: ["st_attn_flat_${i}"]

          - id: "single_transformer_blocks.${i}.attn.to_out.0"
            op: projection.linear
            in: ["st_attn_flat_${i}"]
            out: ["st_attn_out_${i}"]
            config: { in_features: 3072, out_features: 3072 }

          - id: "st_attn_residual_${i}"
            op: math.add
            in: ["h_${offset_i}", "st_attn_out_${i}"]
            out: ["st_mid_${i}"]

          - id: "single_transformer_blocks.${i}.proj_mlp"
            op: projection.linear
            in: ["st_norm_${i}"]
            out: ["st_gate_up_${i}"]
            config: { in_features: 3072, out_features: 18432 }

          - id: "st_swiglu_${i}"
            op: activation.swiglu
            in: ["st_gate_up_${i}"]
            out: ["st_mlp_${i}"]

          - id: "single_transformer_blocks.${i}.proj_out"
            op: projection.linear
            in: ["st_mlp_${i}"]
            out: ["st_mlp_out_${i}"]
            config: { in_features: 9216, out_features: 3072 }

          - id: "st_mlp_residual_${i}"
            op: math.add
            in: ["st_mid_${i}", "st_mlp_out_${i}"]
            out: ["h_${next_offset_i}"]

      - id: norm_out
        op: math.rmsnorm
        in: [h_25]
        out: [final_norm]
        config: { eps: 1e-06, affine: false }

      - id: proj_out
        op: projection.linear
        in: [final_norm]
        out: [sample]
        config:
          in_features: 3072
          out_features: 128
