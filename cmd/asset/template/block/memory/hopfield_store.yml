# Hopfield store block — Hebbian weight accumulation.
# Computes W += outer(pattern, pattern) for one pattern vector.
#
# Inputs:  pattern [N], W_prev [N*N]
# Outputs: W [N*N]
#
# Include this block once per pattern to build the weight matrix before recall.
system:
  topology:
    nodes:
      - id: hopfield_outer
        op: math.outer
        in: [pattern, pattern]
        out: [dW]

      - id: hopfield_accumulate
        op: math.add
        in: [W_prev, dW]
        out: [W]
