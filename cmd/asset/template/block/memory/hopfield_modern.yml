# Modern continuous Hopfield recall block (Ramsauer et al. 2020).
# Single update step: x_new = X^T * softmax(β * X * ξ)
#
# Inputs:
#   xi    [N]     — query (current state)
#   X     [M*N]   — stored patterns matrix (M patterns, each length N)
#   X_T   [N*M]   — transpose of X (precomputed or via shape.transpose)
# Outputs:
#   x_new [N]     — retrieved pattern
#
# β is the inverse temperature: higher β → sharper retrieval.
# Set via config.factor on the hopfield_scale node.
system:
  topology:
    nodes:
      - id: hopfield_sim
        op: math.matmul
        in: [X, xi]
        out: [scores]
        config:
          # shape: [M, N, 1]

      - id: hopfield_scale
        op: math.inv_sqrt_dim_scale
        in: [scores]
        out: [scores_scaled]

      - id: hopfield_softmax
        op: math.softmax
        in: [scores_scaled]
        out: [attn_weights]

      - id: hopfield_retrieve
        op: math.matmul
        in: [X_T, attn_weights]
        out: [x_new]
        config:
          # shape: [N, M, 1]
