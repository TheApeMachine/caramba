# Hopfield recall block — classic discrete, single synchronous update.
# x_new = sign(W * x)
#
# Inputs:  x [N] (query pattern), W [N*N] (Hebbian weight matrix)
# Outputs: x_new [N]
#
# Run iteratively until x_new == x (convergence) in the outer architecture.
system:
  topology:
    nodes:
      - id: hopfield_project
        op: math.matmul
        in: [W, x]
        out: [Wx]
        config:
          # shape must be set by the including architecture: [N, N, 1]

      - id: hopfield_activate
        op: math.sign
        in: [Wx]
        out: [x_new]
